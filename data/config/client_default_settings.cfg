[general]

camera_zoom=2.0
language="en_US"

[mouse_keyboard]

player_move_up="physical:W"
player_move_down="physical:S"
player_move_left="physical:A"
player_move_right="physical:D"
player_chat="physical:Enter"
player_interact="physical:F"

[gamepad]

deadzone_enter=0.3
deadzone_exit=0.2
player_move_up="axis:1:-"
player_move_down="axis:1:+"
player_move_left="axis:0:-"
player_move_right="axis:0:+"
player_look_up="axis:3:-"
player_look_down="axis:3:+"
player_look_left="axis:2:-"
player_look_right="axis:2:+"

[touch]

dynamic_right_stick=false
dynamic_left_stick=false
stick_deadzone=0.3
